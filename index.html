<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Oedipus Rex &middot; A Companion</title>
<style>
/* ============================================================
   OEDIPUS REX — inherits the Antigone skeleton (dark ground,
   bone text, one metal accent, oxblood for death) but shifts to
   this play's world: a colder, plague-lit stone; a brazen gold
   for Apollo's oracle and the truth dragged into light; a cold
   slate for fate and prophecy. Signature: WHERE THREE ROADS MEET
   \u2014 a crossroads glyph at every threshold.
   ============================================================ */
:root{
  --ground:  #0f0e11;
  --ground-2:#17151b;
  --ground-3:#211d26;
  --bone:    #e9e2d5;
  --ash:     #9c9488;   /* muted text */
  --stone:   #6a655e;   /* hairlines, tracked labels */
  --gold:    #d2a53c;   /* interactive: links, oracle, the light of truth */
  --gold-d:  #997726;
  --oxblood: #a83228;   /* death only */
  --slate:   #6f7d88;   /* fate, prophecy, pronunciation */
  --maxread: 63ch;
  --disp: "Optima","Palatino Linotype",Palatino,"Iowan Old Style",Georgia,serif;
  --body: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --util: "Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;background:var(--ground);min-height:100vh;color-scheme:dark}
body{min-height:100vh}
body{margin:0;background:var(--ground);color:var(--bone);font-family:var(--body);font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-wrap:break-word}
a{color:inherit}
button{font-family:inherit}

/* crossroads divider \u2014 the signature (a Y-junction where three roads meet) */
.cross{height:26px;border:0;position:relative;background-repeat:no-repeat;background-position:center;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'><g stroke='%23997726' stroke-width='1.1' fill='none'><path d='M15 14V4'/><path d='M15 14L6 24'/><path d='M15 14L24 24'/></g><circle cx='15' cy='14' r='1.5' fill='%23997726'/></svg>");}
.cross::before{content:"";position:absolute;top:44%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d) 26%,transparent 41%,transparent 59%,var(--gold-d) 74%,transparent);opacity:.5}

.wrap{max-width:920px;margin:0 auto;padding:0 20px}
header.top{position:sticky;top:0;z-index:40;background:rgba(15,14,17,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--ground-3)}
.top .row{max-width:920px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
.brand{font-family:var(--disp);letter-spacing:.22em;text-transform:uppercase;font-size:.84rem;color:var(--bone);cursor:pointer;background:none;border:0;padding:6px 0}
.brand b{color:var(--gold);font-weight:600}
nav.modes{margin-left:auto;display:flex;gap:2px;flex-wrap:wrap}
nav.modes button{background:none;border:0;color:var(--ash);cursor:pointer;font-family:var(--util);font-size:.71rem;letter-spacing:.13em;text-transform:uppercase;padding:7px 9px;border-radius:3px}
nav.modes button:hover{color:var(--bone);background:var(--ground-2)}
nav.modes button[aria-current="true"]{color:var(--ground);background:var(--gold)}

main{padding:28px 0 96px;min-height:70vh}
.fade{animation:fade .5s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* hero */
.hero{padding:40px 0 8px}
.eyebrow{font-family:var(--util);font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--stone);margin:0 0 18px}
.hero h1{font-family:var(--disp);font-weight:600;line-height:1.12;margin:0;font-size:clamp(2rem,6.4vw,3.5rem);letter-spacing:.005em}
.hero h1 .b{color:var(--oxblood)}
.hero h1 .g{color:var(--gold)}
.hero p.lede{max-width:58ch;color:var(--ash);font-size:1.06rem;margin:22px 0 0}

.ways{display:grid;grid-template-columns:1fr;gap:12px;margin:30px 0 0}
@media(min-width:640px){.ways{grid-template-columns:1fr 1fr}}
.way{text-align:left;cursor:pointer;background:var(--ground-2);border:1px solid var(--ground-3);border-radius:7px;padding:18px 18px 16px;color:var(--bone);transition:border-color .18s,transform .18s}
.way:hover{border-color:var(--gold-d);transform:translateY(-2px)}
.way .k{font-family:var(--util);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:7px}
.way .t{font-family:var(--disp);font-size:1.2rem;display:block;margin-bottom:5px}
.way .d{color:var(--ash);font-size:.9rem;line-height:1.45}

/* start-here orientation */
.orient{max-width:64ch;margin:32px 0 6px;padding:20px 22px 8px;background:var(--ground-2);border:1px solid var(--ground-3);border-left:3px solid var(--gold);border-radius:8px}
.orient-h{font-family:var(--util);font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin:0 0 15px}
.orient p{margin:0 0 13px;font-size:1rem;line-height:1.58;color:var(--bone)}
.orient p b{display:block;font-family:var(--util);font-size:.68rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 3px}
.orient .xhint{color:var(--gold);border-bottom:1px dotted var(--gold-d)}

/* view heads */
.vhead{margin:6px 0 20px}
.vhead .eyebrow{margin-bottom:10px}
.vhead h2{font-family:var(--disp);font-weight:600;font-size:1.9rem;margin:0;letter-spacing:.01em}
.vhead p{color:var(--ash);max-width:60ch;margin:12px 0 0}

/* themes */
.cluster{margin:0 0 26px}
.cluster h3{font-family:var(--disp);font-size:1.28rem;margin:0 0 4px;color:var(--bone);border-left:3px solid var(--gold);padding-left:12px}
.cluster .blurb{color:var(--ash);font-size:.95rem;margin:0 0 12px;padding-left:15px;max-width:58ch}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding-left:15px}
.chip{cursor:pointer;background:var(--ground-2);border:1px solid var(--ground-3);border-radius:20px;padding:7px 14px;color:var(--bone);font-size:.9rem;display:inline-flex;align-items:center;gap:8px;transition:border-color .16s,background .16s}
.chip:hover{border-color:var(--gold-d);background:var(--ground-3)}
.chip .tag{font-family:var(--util);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone)}
.chip.major .dotm{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block}

/* by the play + investigation share the spine look */
.spine{border-left:2px solid var(--ground-3);margin-left:6px}
.beat{position:relative;padding:0 0 4px 26px;margin:0 0 18px}
.beat::before{content:"";position:absolute;left:-7px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--ground);border:2px solid var(--stone)}
.beat.ode::before{background:var(--gold);border-color:var(--gold)}
.beat .bk{font-family:var(--util);font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--stone)}
.beat.ode .bk{color:var(--gold)}
.beat .bkg{color:var(--ash);margin-left:10px;text-transform:none;letter-spacing:.02em;font-size:.92em}
.beat h4{font-family:var(--disp);font-size:1.16rem;margin:2px 0 6px}
.bs{color:var(--ash);font-size:.94rem;margin:0 0 10px;max-width:60ch}
.bs .xref{color:var(--gold)}

/* investigation clue nodes carry roman numerals */
.beat.clue::before{background:var(--ground);border-color:var(--gold-d);width:22px;height:22px;left:-13px;top:0;border-radius:50%;display:flex}
.beat.clue{padding-left:30px}
.beat .rn{position:absolute;left:-13px;top:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-family:var(--util);font-size:.6rem;letter-spacing:.02em;color:var(--gold)}

/* house */
.houses{display:grid;grid-template-columns:1fr;gap:22px}
.housecard{background:var(--ground-2);border:1px solid var(--ground-3);border-radius:9px;padding:20px}
.housecard h3{font-family:var(--disp);font-size:1.2rem;margin:0 0 3px}
.housecard .sub{font-family:var(--util);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);margin:0 0 16px}
.gen{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 6px;align-items:center}
.genlabel{font-family:var(--util);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);width:100%;margin-top:10px}
.hinge{margin-top:20px;padding-top:16px;border-top:1px dashed var(--ground-3);color:var(--ash);font-size:.94rem;max-width:60ch}
.hinge b{color:var(--bone);font-weight:600}
.hinge .xref{color:var(--gold)}

/* reference */
.refgrid{display:grid;grid-template-columns:1fr;gap:2px}
.refrow{display:flex;gap:12px;align-items:baseline;padding:11px 8px;border-bottom:1px solid var(--ground-2);cursor:pointer}
.refrow:hover{background:var(--ground-2)}
.refrow .rn2{font-family:var(--disp);font-size:1.06rem;min-width:34%}
.refrow .re{color:var(--ash);font-size:.88rem;line-height:1.4}
.refrow .rt{font-family:var(--util);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);min-width:76px;text-align:right}

/* entity page */
.entity{max-width:var(--maxread)}
.entity .kicker{font-family:var(--util);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);display:flex;gap:12px;align-items:center;margin:0 0 8px}
.entity .kicker .tier{color:var(--gold)}
.entity h1{font-family:var(--disp);font-weight:600;font-size:clamp(2rem,7vw,2.9rem);margin:0;line-height:1.1}
.entity .pron{font-family:var(--util);font-size:.82rem;letter-spacing:.04em;color:var(--ash);margin:9px 0 0}
.entity .pron b{color:var(--slate);font-weight:600}
.entity .aka{color:var(--ash);font-style:italic;margin:6px 0 0}
.essence{font-size:1.24rem;line-height:1.5;color:var(--bone);margin:18px 0 4px;max-width:56ch}
.essence .xref{color:var(--gold)}

section.sec{border-top:1px solid var(--ground-2);margin-top:14px}
section.sec > summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:16px 0 12px}
section.sec > summary::-webkit-details-marker{display:none}
section.sec > summary .h{font-family:var(--disp);font-size:1.24rem;color:var(--bone)}
section.sec > summary .mk{margin-left:auto;color:var(--stone);font-family:var(--util);font-size:1.2rem;line-height:1;transition:transform .2s}
section.sec[open] > summary .mk{transform:rotate(45deg)}
section.sec .body{padding:0 0 18px}
section.sec .body p{margin:0 0 14px}
section.sec .body .xref{color:var(--gold)}

.panel{border:1px solid var(--ground-3);border-radius:8px;margin:14px 0 0;overflow:hidden;background:var(--ground-2)}
.panel > summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:15px 18px}
.panel > summary::-webkit-details-marker{display:none}
.panel > summary .pl{font-family:var(--util);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase}
.panel.beneath > summary .pl{color:var(--slate)}
.panel.beyond > summary .pl{color:var(--gold)}
.beat .panel{margin-top:10px}
.panel.scene-stage > summary .pl{color:var(--ash)}
.panel.scene-turns > summary .pl{color:var(--gold)}
.panel > summary .pt{font-family:var(--disp);font-size:1.02rem;color:var(--ash)}
.panel > summary .mk{margin-left:auto;color:var(--stone);font-family:var(--util);transition:transform .2s}
.panel[open] > summary .mk{transform:rotate(45deg)}
.panel .pbody{padding:2px 18px 18px}
.panel .pbody p{margin:0 0 13px;font-size:.98rem}
.panel .pbody p:last-child{margin-bottom:0}
.panel .xref{color:var(--gold)}

.rels{margin:26px 0 0}
.rels h3{font-family:var(--util);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--stone);margin:0 0 12px}
.rel{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--ground-2);cursor:pointer}
.rel:hover .rname{color:var(--gold)}
.rel .rname{font-family:var(--disp);font-size:1.04rem;min-width:38%}
.rel .rlab{color:var(--ash);font-size:.9rem}

.backbar{margin:0 0 18px}
.backbtn{background:none;border:0;color:var(--ash);cursor:pointer;font-family:var(--util);font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;padding:6px 0}
.backbtn:hover{color:var(--gold)}

.xref{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold-d);cursor:pointer;white-space:nowrap}
.xref:hover{border-bottom-style:solid}
.xref.broken{color:var(--oxblood);border-color:var(--oxblood)}

/* popover */
#pop{position:fixed;z-index:60;max-width:320px;width:calc(100vw - 32px);background:var(--ground-3);border:1px solid var(--gold-d);border-radius:9px;box-shadow:0 18px 50px rgba(0,0,0,.6);padding:15px 16px;display:none}
#pop.show{display:block;animation:fade .16s ease both}
#pop .pk{font-family:var(--util);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);margin:0 0 4px}
#pop .pn{font-family:var(--disp);font-size:1.16rem;margin:0 0 4px}
#pop .ppron{font-family:var(--util);font-size:.72rem;letter-spacing:.03em;color:var(--slate);margin:0 0 8px}
#pop .pe{color:var(--ash);font-size:.92rem;line-height:1.45;margin:0 0 12px}
#pop .po{background:var(--gold);color:var(--ground);border:0;border-radius:5px;cursor:pointer;font-family:var(--util);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px}
#pop .po:hover{background:var(--bone)}
@media(max-width:560px){#pop{left:16px!important;right:16px;width:auto;bottom:16px!important;top:auto!important;max-width:none}}

footer.foot{color:var(--stone);font-family:var(--util);font-size:.7rem;letter-spacing:.08em;text-align:center;padding:10px 0 40px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:2px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* --- opaque-ground guarantee (literal colors; must win everywhere) --- */
html{background-color:#0f0e11 !important;color-scheme:dark}
body{background-color:#0f0e11 !important;color:#e9e2d5 !important;}
body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background-color:#0f0e11;z-index:-1;pointer-events:none}
header.top{background-color:rgba(15,14,17,.97) !important}
main{background-color:transparent}
#pop{background-color:#17151b !important}
</style>
</head>
<body>
<header class="top"><div class="row">
  <button class="brand" onclick="go('#home')">OEDIPUS REX <b>&middot;</b> a companion</button>
  <nav class="modes" id="modes"></nav>
</div></header>
<hr class="cross">
<main><div class="wrap" id="view"></div></main>
<hr class="cross">
<footer class="foot">SOPHOCLES &middot; c. 429 BCE &middot; an offline companion, not the play itself</footer>
<div id="pop" role="dialog" aria-label="Preview"></div>

<script>
"use strict";

/* ================= DATA ================= */
var THEMES = [
  { id:"fate",      name:"Fate & the Oracle",   blurb:"A god's word spoken before he was born \u2014 that he would kill his father and marry his mother \u2014 and a life spent running straight into it." },
  { id:"sight",     name:"Sight & Blindness",   blurb:"The seer is blind and sees; the king has eyes and sees nothing; the truth is only faced when the eyes are gone." },
  { id:"pollution", name:"Plague & Pollution",  blurb:"A city rotting from a hidden crime, and the hunt for the source that turns, unbearably, back on the hunter." },
  { id:"identity",  name:"Identity & Origin",   blurb:"The oldest question \u2014 who am I, whose child am I? \u2014 and the horror waiting in its answer." }
];
var TYPES = { character:"Character", concept:"Idea", place:"Place", object:"Object", chorus:"Chorus" };

/* The Investigation (spine sample \u2014 the full clue-chain comes in the batch) */
var CLUES = [
  { n:"I", h:"The Plague", body:"A crowd of suppliants \u2014 old men, priests, children \u2014 sits at the palace altars with olive branches, and will not move. [[thebes|Thebes]] is dying. The [[the_priest|priest of Zeus]] speaks for them: the crops rot in the fields, the herds sicken, women labour and bring forth nothing living, and a god of fever walks the streets. The city, he says, is a ship going down with all aboard.\n\nThey have not come to a god. They have come to [[oedipus|Oedipus]] \u2014 the stranger who arrived years ago with nothing, answered the [[riddle|riddle]] that was strangling the city, and was made king for it. He saved them once. The priest asks him, plainly, to do it again.\n\nOedipus meets them already moving. He has wept for the city, he says, lain awake over it, and \u2014 before they even asked \u2014 sent his brother-in-law [[creon|Creon]] to the oracle at [[delphi|Delphi]] to ask what must be done. The man of action is ahead of the crisis. He has begun the investigation before he knows what it is.", stage:"The play begins in the middle of the crisis, the stage crowded with suppliants at the altars \u2014 an <em>in medias res</em> opening that hands the audience a mystery before a single fact. The [[the_priest|priest]] frames the city as a ship going down, the first sounding of the play's \u201cship of state\u201d imagery.", turns:"The detective form is set in the first minutes: a symptom without a cause, and a ruler who stakes everything on finding it. The irony is already loaded \u2014 the audience knows the answer the hunt will reach, and settles in to watch [[oedipus|Oedipus]] walk toward it." },
  { n:"II", h:"The Oracle's Charge", body:"[[creon|Creon]] arrives crowned with laurel \u2014 a good sign \u2014 and asks whether he should speak in front of the crowd. Speak before them all, says [[oedipus|Oedipus]]; I grieve for these people more than for my own life. The line is true, and it will cost him everything.\n\nThe god's answer is precise. [[thebes|Thebes]] harbours a pollution, and the pollution is a man: the killer of the old king [[laius|Laius]], never hunted, never punished, still living on Theban ground. Drive him out or pay blood for blood, and the [[plague_pollution|plague]] lifts.\n\nOedipus wants details and gets almost none. Laius went to consult an oracle and never came home; he was killed on the road by robbers, they say; the one servant who escaped told a confused story. Why, Oedipus asks, was none of this pursued? Because the [[the_sphinx|Sphinx]] was at the gates, [[creon|Creon]] answers, and the city had no attention to spare for an old murder. So Oedipus takes the case himself \u2014 and swears, before the whole city, to find the man and cast him out.", stage:"[[apollo|Apollo]]'s word arrives by report, never in person \u2014 the god who drives the play stays offstage from first to last, present only as instruction and consequence. In a single scene the plague becomes a murder case, and the tragedy becomes an investigation.", turns:"The charge is the trap's jaws. Every vow [[oedipus|Oedipus]] makes to find and punish the killer is a vow made against himself, and the audience hears the second meaning under each line. The hunt for the source of [[plague_pollution|pollution]] is the play's whole engine." },
  { n:"III", h:"The King's Curse", body:"Oedipus turns his vow into law, and the law into a curse. Whoever knows the killer must speak. Whoever shelters him is cut off from the city \u2014 no altar, no water, no word. And the murderer himself, whoever he is, is to be shunned by every citizen and driven out to wear away his life in misery, unbefriended and alone.\n\nThen he goes further than any oath required. Since he now holds the throne [[laius|Laius]] held, and the wife Laius held, he will fight for the dead king as though the dead man were his own father. The whole theatre hears the second meaning. He does not.\n\nHe presses for facts. Laius was killed where three roads meet, on the way to [[delphi|Delphi]], years ago. Of the party, one man escaped and came home \u2014 and asked, immediately, to be sent far away to herd sheep in the hills. Oedipus sends for him. He also sends, on the [[chorus|elders']] advice, for the one man who might see what no witness could: the blind prophet [[tiresias|Tiresias]].", stage:"The self-curse is <em>dramatic irony</em> in its purest form \u2014 a solemn oath whose true target is the speaker, understood by everyone in the theatre except the man swearing it. The Greek audience knew the story; the dread lies in watching the words land where the speaker cannot see.", turns:"This is the moment the hunter unknowingly condemns himself, and it fixes the play's terrible symmetry: to keep his oath, [[oedipus|Oedipus]] must destroy [[oedipus|Oedipus]]. His vow to avenge [[laius|Laius]] as if for his own father is truer than he will ever want it to be." },
  { n:"IV", h:"The Seer's Accusation", body:"[[tiresias|Tiresias]] is led in by a boy, and wants only to go home again. He begs to be dismissed. He will not answer. Let me go, he says; bear your burden and I will bear mine. [[oedipus|Oedipus]] \u2014 who cannot understand a man refusing to help him save the city \u2014 accuses him first of indifference, then of complicity, then of the murder itself.\n\nStung, the old man breaks his silence, and the truth comes out of him like something torn loose. You are the polluted thing. You are the killer you are hunting. You are living in shame with the one closest to you and do not know it. He tells Oedipus that a father's and a mother's curse will drive him out of this land, that he who sees now will be blind, and that this day will give him his birth and destroy him.\n\nIt is the whole answer, spoken aloud in the first act \u2014 and [[oedipus|Oedipus]] throws it away. He hears a plot: [[creon|Creon]] wants the throne, and has bought a fraudulent seer to slander him. He mocks the prophet's blindness, and boasts that when the [[the_sphinx|Sphinx]] came it was not this famous seer who saved [[thebes|Thebes]] \u2014 it was Oedipus, who knew nothing and worked it out. The pride that saved the city refuses the truth about it.", stage:"The confrontation is an <em>agon</em>, a formal debate that sharpens into <em>stichomythia</em> \u2014 line traded for line like sword-strokes. It stages the play's [[sight_blindness|blindness-and-sight]] theme whole, in one scene: the blind man sees, the clear-eyed king does not.", turns:"The entire truth is spoken aloud in the first act \u2014 and refused. That refusal is the engine: not a mystery the hero cannot solve, but a truth he cannot yet bear to accept. His leap to suspect [[creon|Creon]] shows the [[hubris|pride]] that will carry him to the end." },
  { n:"V", h:"Where Three Roads Meet", body:"The palace has become a war. [[creon|Creon]] comes to defend himself, [[oedipus|Oedipus]] threatens him with death, and [[jocasta|Jocasta]] comes out to stop two grown men from tearing each other apart over a prophet's riddle. When she hears what it is about, she tries to laugh it away with a piece of hard-won proof.\n\nNo mortal, she says, has any share in the art of prophecy \u2014 and she can prove it. An oracle once came to [[laius|Laius]] that he would be killed by his own son. And what happened? His son was destroyed \u2014 they pinned the infant's ankles and cast him out on a mountainside \u2014 and Laius was killed instead by foreign robbers, at a place where three roads meet. So much for prophecy.\n\nShe means it as comfort. She has just said the one word that matters. Where three roads meet. [[oedipus|Oedipus]] goes cold and asks her to say it again \u2014 where, exactly, and when, and what did [[laius|Laius]] look like. Tall, she says, greying, and in build not unlike your own. Every answer lands like a stone. He begins to be afraid, he says, that the blind prophet could see after all.", stage:"The reveal is built from an offhand remark, not a confession \u2014 the play's method throughout. Information arrives sideways, meaning to comfort, and detonates. Watch Sophocles plant the fatal word in a speech designed to dismiss the very fear it confirms.", turns:"The play's signature pattern, in a single beat: the clue meant to reassure is the clue that damns. [[jocasta|Jocasta]]'s scorn for prophecy hands [[oedipus|Oedipus]] the first hard link between himself and the murder he is hunting. The dread begins here and never lifts." },
  { n:"VI", h:"The King's Own Story", body:"Now [[oedipus|Oedipus]] tells his own story, and hands the investigation the evidence it has been missing. He was raised a prince in [[corinth|Corinth]], son of [[polybus|Polybus]] and [[merope|Merope]]. At a banquet a drunk called him a bastard, no true son of his father. It ate at him. He went to [[delphi|Delphi]] to be told the truth about his birth \u2014 and the god did not answer that question. Instead it said the unspeakable thing: that he would lie with his mother and kill his father.\n\nSo he ran. He never went back to [[corinth|Corinth]] again, steering by the stars away from the place where such a thing could come true. And on the road, in the hill country, at a place where three roads met, an old man in a carriage with a herald and attendants tried to force him off the path. The driver struck him. Oedipus struck back, and in the fight he killed the old man and all his party \u2014 or so he believed.\n\nHe lays the two accounts side by side, and they match: the place, the time, the age of the man, the size of the party. If the old man he killed was [[laius|Laius]], then he is the murderer he has cursed with his own mouth, banished with his own edict, and hunted with his own hands. One thread of hope remains, and he holds it hard. The surviving servant said <em>robbers</em>, plural. One man is not many. Send for him, he says. Send for the [[shepherd|shepherd]].", stage:"The investigation turns inward: the detective interrogates himself, laying out his own history as evidence, until the suspect list narrows to one \u2014 the investigator. Sophocles keeps a thread of hope alive: the survivor once said \u201crobbers,\u201d plural, and the audience watches [[oedipus|Oedipus]] cling to a single word.", turns:"The hunt has found its man; only the proof is missing. [[oedipus|Oedipus]]'s [[knowledge|need to know]] now works against him \u2014 he could stop, and cannot. He calls for the one witness who can end his doubt, not yet grasping that certainty is the last thing he should want." },
  { n:"VII", h:"The Corinthian's Good News", body:"Before the shepherd can come, a cheerful stranger arrives from [[corinth|Corinth]] with what he is certain is good news. [[polybus|Polybus]] is dead \u2014 of age, in his bed \u2014 and Corinth wants [[oedipus|Oedipus]] home as king.\n\n[[jocasta|Jocasta]] seizes on it in triumph: where are the oracles now? The father Oedipus was fated to kill has died of nothing but old age. Oedipus laughs with her \u2014 and then stops, because half the prophecy still stands. His mother [[merope|Merope]] is alive, and while she lives he cannot go home.\n\nThe [[corinthian|messenger]] hears the king's fear and cannot bear to leave a man frightened over nothing. He offers the kindest fact he has: you need not fear her, because [[polybus|Polybus]] and [[merope|Merope]] were never your parents. I know, because I gave you to them myself. I was a herdsman on [[cithaeron|Cithaeron]], and I took you \u2014 an infant with his ankles pinned together \u2014 from another shepherd, a servant of [[laius|Laius]], and carried you down the mountain as a gift. The one man who could confirm it, he adds, is that shepherd. It is the same man [[oedipus|Oedipus]] has already sent for.", stage:"The scene is built on a cruel structure of relief-then-ruin: the good news that seems to free him is the very thread that unravels everything. The [[corinthian|Corinthian]]'s only motive is kindness, which makes the [[fate_freewill|machinery]] feel less like a curse than like the ordinary, terrible workings of chance.", turns:"The trap springs. The one fact that lifts a prophecy delivers the other, and the foundling detail opens the last door. [[oedipus|Oedipus]]'s relief curdles in real time \u2014 the play's engine, the reassurance that damns, running now at full power." },
  { n:"VIII", h:"The Queen Sees First", body:"[[jocasta|Jocasta]] understands. Not gradually \u2014 all at once, standing there, while her husband is still cross-examining a messenger about a mountain. She knows whose child was pinned and cast out on [[cithaeron|Cithaeron]]. She knows who is standing in front of her.\n\nShe begs him to stop. For the love of the gods, she says, if you care for your own life, do not search this out. Let it be enough that I am sick with it. He mistakes her entirely: she is ashamed, he decides, that her husband may turn out to be lowborn, a slave's child, no fit match for a queen. He tells her he does not care \u2014 he will call himself a child of Fortune and be proud of it. Nothing she says can turn him.\n\nHer last words to him are not an argument. Unhappy man, she says \u2014 may you never learn who you are. Then she goes into the palace without another word, and the doors close behind her. The [[chorus|elders]] feel the silence and are afraid of it. [[oedipus|Oedipus]], alone now with the thing he has hunted all his life, calls for the last witness.", stage:"Her exit is one of the great silent departures in tragedy \u2014 no speech, only the withdrawal, which the audience reads exactly. Her death, like every death here, happens offstage and will reach us through a [[second_messenger|messenger]]. The scene splits the knowing between them: she has it, he almost does.", turns:"The case is solved a step before the hero solves it, and by the person with the most to lose. [[jocasta|Jocasta]]'s last effort is to stop the knowing \u2014 to leave the truth unspoken so that it might not be true. [[oedipus|Oedipus]], mistaking her horror for shame at his birth, presses on. Their paths part here for good." },
  { n:"IX", h:"The Recognition", body:"The [[shepherd|shepherd]] is brought in old and unwilling, and he knows the [[corinthian|Corinthian]] at once, and would rather die than say so. He evades. He pleads. [[oedipus|Oedipus]], past all mercy now, has his arms twisted until he speaks.\n\nYes \u2014 there was a child. Yes \u2014 it came from the house of [[laius|Laius]]. It was [[jocasta|Jocasta]] herself who put it in his hands, because of a prophecy that the boy would kill his father. He was told to destroy it on the mountain. He could not. He pitied it, and gave it away to a stranger from another country, thinking it would be carried far off and never heard of again. And if you are that child, he says, then you were born to misery.\n\nEverything closes. The old man at the [[crossroads|crossroads]] was his father. The queen in his bed is his mother. The infant left to die on the mountain was himself. He is the pollution he swore to drive from the city, the murderer he cursed with his own mouth, the answer to his own investigation. He cries out that the light must never look on him again, and goes inside \u2014 where he finds [[jocasta|Jocasta]] dead by her own hand, and takes the golden pins from her dress, and drives them into his eyes.\n\nHe does not kill himself. He asks to be cast out of [[thebes|Thebes]], as he himself decreed the killer must be, and begs to be sent to die on [[cithaeron|Cithaeron]] \u2014 the mountain that should have taken him at the beginning. The detective has found his man. The hunt ends where it started: on him.", stage:"The <em>anagnorisis</em> \u2014 the recognition \u2014 and the <em>peripeteia</em> \u2014 the reversal \u2014 fall in the same stroke, which is exactly why Aristotle held this play up as the model tragedy. The catastrophe itself is not shown: a [[second_messenger|messenger]] carries it out in words, and the blinded king returns in a changed mask.", turns:"Every thread meets at one point, and the point is [[oedipus|Oedipus]]. He chooses [[sight_blindness|blindness]] now that he has seen \u2014 ending the eyes that looked too late. The play closes on its unanswered question: was this fate, or the working-out of his own nature \u2014 and would knowing sooner have changed anything at all?" }
];

var ENTITIES = [

{ id:"oedipus", name:"Oedipus", type:"character", tier:"major", pron:"ED-ih-pus", themes:["fate", "sight", "identity", "pollution"], essence:"The king who vows to hunt down the killer polluting his city, and step by step uncovers that the murderer he seeks is himself \u2014 and worse.", sections:[
      { h:"The Solver of Riddles", body:"Oedipus is not [[thebes|Thebes]]' native son but its rescuer. A stranger passing through, he answered the [[riddle|riddle of the Sphinx]] when no one else could, freed the city from the monster, and was rewarded with the empty throne and the hand of the widowed queen, [[jocasta|Jocasta]]. Quick, fearless, and loved, he is the man who solves what others cannot \u2014 which is exactly the trap the play sets for him." },
      { h:"The Hunt", body:"When plague falls on the city, the [[oracle_prophecy|oracle]] demands the killer of the old king [[laius|Laius]] be found and cast out. Oedipus throws his whole nature into the search: he curses the unknown murderer, calls in the prophet [[tiresias|Tiresias]], and drives forward past every warning \u2014 the seer's, [[jocasta|Jocasta]]'s, his own rising dread \u2014 unable, once started, to stop hunting." },
      { h:"Where Three Roads Meet", body:"The clues gather toward a single memory. Years before, fleeing an oracle that said he would kill his father and marry his mother, Oedipus had left [[corinth|Corinth]] and the parents he thought were his. On the road, at a place where three roads met, he had quarrelled with an old man and killed him. [[jocasta|Jocasta]]'s account of how [[laius|Laius]] died matches it exactly \u2014 and the ground begins to open." },
      { h:"The Truth", body:"The last witnesses complete it. The man he killed at the [[crossroads|crossroads]] was his father; the wife in his bed is his mother; the infant once left to die on the mountain was himself. He is the pollution he swore to drive out. [[jocasta|Jocasta]] takes her own life; Oedipus puts out his eyes and asks only to be cast from the city. The solver of every riddle never saw the one answer that was himself." },
      { h:"Before the Play: The Child on the Mountain", body:"Everything the play uncovers happened long before it starts.\n\nKing [[laius|Laius]] of [[thebes|Thebes]] was warned by the [[oracle_prophecy|oracle]] that his own son would kill him. So when [[jocasta|Jocasta]] bore a boy, they pinned his ankles together with a spike and gave him to a [[shepherd|servant]] to leave on [[cithaeron|Cithaeron]], the mountain where the city put out its unwanted children to die.\n\nThe shepherd could not do it. He handed the baby to a herdsman from [[corinth|Corinth]] over the hills, who carried him home. The childless king and queen of Corinth, [[polybus|Polybus]] and [[merope|Merope]], raised him as their own and told him nothing. They called him Oedipus \u2014 <em>swollen-foot</em> \u2014 for the scars on his ankles, and he grew up a prince without ever asking why he had a name like a wound.\n\nSo when the god later told a young man that he would kill his father and marry his mother, that young man knew exactly whose son he was, and ran in exactly the wrong direction." }
    ], beneath:"<p>The play's engine is a terrible circularity: every action Oedipus takes to escape the prophecy is the action that fulfills it. He leaves [[corinth|Corinth]] to avoid killing his father \u2014 and so meets his true father a stranger on the road. That is the heart of the [[fate_freewill|fate-and-freedom]] question the play refuses to resolve: is he doomed, or the author of his own ruin, or somehow both at once?</p><p>He is also the supreme case of [[sight_blindness|sight and blindness]]. He reads the riddle of Man and is blind to himself; he mocks the blind [[tiresias|Tiresias]] and then, seeing at last, destroys the eyes that would not see. Aristotle built his whole theory of tragedy on this play \u2014 the good man of high standing undone not by vice but by error, the reversal and recognition falling in the same stroke.</p>", beyond:"<p>Sophocles compresses the detective's work into a single day and a single place \u2014 the reveal machinery so tight that Aristotle held it up as the model tragedy. The violence stays offstage, reported by a messenger; the blinded king returns in a changed mask, and the horror lives in language rather than spectacle.</p><p>The Greek title calls him <em>Tyrannos</em> \u2014 ruler by merit, not by birth \u2014 which is its own bitter irony for a man who turns out to be the rightful heir after all. In the modern imagination he is inseparable from Freud, who borrowed the name for a universal desire; it is worth remembering that the play is not about a secret wish but about a man who did everything right and was annihilated anyway.</p><p>A word about Freud, because it distorts everything for modern readers. He borrowed the name for a theory about a universal childhood desire \u2014 and the play is not that. Oedipus has no wish to marry his mother; he does not know she is his mother, and he spent his youth fleeing across the world to avoid exactly that. The horror is not desire but ignorance. He is a man who did everything right, with good information and good intentions, and was destroyed anyway. Reading the play as a case study of secret longing is reading past the thing that makes it terrifying.</p>", rels:[

      { id:"creon", label:"his brother-in-law" },

{ id:"jocasta", name:"Jocasta", type:"character", tier:"major", pron:"joh-KAS-tuh", themes:["fate", "sight", "identity"], essence:"Thebes' queen, wife to Oedipus and \u2014 unknown to them both \u2014 his mother; the first to grasp the truth, and the first it destroys.", rels:[
      { id:"oedipus", label:"her husband, and her son" },
      { id:"laius", label:"her first husband" },
      { id:"creon", label:"her brother" },
      { id:"oracle_prophecy", label:"the word she tried to outrun" },
      { id:"second_messenger", label:"who reports her death" },
      { id:"the_children", label:"her daughters" },
      { id:"knowledge", label:"which she begs him not to seek" },
      { id:"exposure", label:"what she did to her son" },
